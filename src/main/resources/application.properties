spring.application.name=task-management-board

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_management_board}
spring.datasource.username=${DB_USER:task_management_board}
spring.datasource.password=${DB_PASSWORD:task_management_board}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Docker Compose support – disabled when running inside a container ────────
spring.docker.compose.enabled=${DOCKER_COMPOSE_ENABLED:true}
